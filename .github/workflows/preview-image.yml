name: Preview Docker Image

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to publish
        required: true
      docker_repository:
        description: Optional Docker repository override
        required: false
        default: ""

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Resolve Docker repository
        id: repo
        env:
          DEFAULT_REPOSITORY: ${{ secrets.DOCKER_HUB_LOGIN }}/verana-front
          INPUT_REPOSITORY: ${{ github.event.inputs.docker_repository }}
        run: |
          REPOSITORY="${INPUT_REPOSITORY:-$DEFAULT_REPOSITORY}"
          if [ -z "$REPOSITORY" ]; then
            echo "Docker repository could not be resolved" >&2
            exit 1
          fi
          echo "repository=$REPOSITORY" >> "$GITHUB_OUTPUT"

      - name: Docker login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: Build and push preview image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.repo.outputs.repository }}:${{ github.event.inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Publish summary
        run: |
          echo "Preview image published:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- ${{ steps.repo.outputs.repository }}:${{ github.event.inputs.image_tag }}" >> "$GITHUB_STEP_SUMMARY"
