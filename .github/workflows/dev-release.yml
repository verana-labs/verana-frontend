name: Dev Pre-release (semantic-release)

on:
  push:
    branches: [main, "release/**"]

jobs:
  dev-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node v24
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare semantic-release config
        run: |
          cat > .releaserc.json <<'EOF'
          {
            "branches": [
              "release",
              { "name": "main", "prerelease": "dev" }
            ],
            "plugins": [
              [
                "@semantic-release/commit-analyzer",
                {
                  "preset": "angular",
                  "releaseRules": [
                    { "type": "refactor", "release": "patch" },
                    { "type": "build", "release": "patch" }
                  ]
                }
              ],
              [
                "@semantic-release/npm",
                {
                  "npmPublish": false
                }
              ],
              "@semantic-release/release-notes-generator"
            ]
          }
          EOF

      - name: Run semantic-release
        id: semantic
        uses: cycjimmy/semantic-release-action@16ca923e6ccbb50770c415a0ccd43709a8c5f7a4 # v4.2.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
        if: steps.semantic.outputs.new_release_published == 'true'

      - name: Docker login
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        if: steps.semantic.outputs.new_release_published == 'true'
        with:
          username: ${{ secrets.DOCKER_HUB_LOGIN }}
          password: ${{ secrets.DOCKER_HUB_PWD }}

      - name: Build & push dev Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        if: steps.semantic.outputs.new_release_published == 'true'
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_LOGIN }}/verana-front:dev
            ${{ secrets.DOCKER_HUB_LOGIN }}/verana-front:v${{ steps.semantic.outputs.new_release_major_version }}-dev
            ${{ secrets.DOCKER_HUB_LOGIN }}/verana-front:v${{ steps.semantic.outputs.new_release_major_version }}.${{ steps.semantic.outputs.new_release_minor_version }}-dev
            ${{ secrets.DOCKER_HUB_LOGIN }}/verana-front:v${{ steps.semantic.outputs.new_release_version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Helm
        if: steps.semantic.outputs.new_release_published == 'true'
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Log in to Docker Hub Helm Registry
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "${{ secrets.DOCKER_HUB_PWD }}" | helm registry login -u "${{ secrets.DOCKER_HUB_LOGIN }}" --password-stdin docker.io

      - name: Push Helm chart to Docker Hub OCI repo
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          TAGS=(
            "v${{ steps.semantic.outputs.new_release_major_version }}.${{ steps.semantic.outputs.new_release_minor_version }}-dev"
            "v${{ steps.semantic.outputs.new_release_version }}"
          )
          for tag in "${TAGS[@]}"; do
            CHART_NAME=$(grep '^name:' ./charts/Chart.yaml | awk '{print $2}')
            helm dependency update ./charts
            helm package ./charts --version $tag -d ./charts
            helm push ./charts/$CHART_NAME-$tag.tgz oci://docker.io/"${{ secrets.DOCKER_HUB_LOGIN }}"
          done

      - name: Publish Summary
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "Docker Images" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- verana-front:dev" >> $GITHUB_STEP_SUMMARY
          echo "- verana-front:v${{ steps.semantic.outputs.new_release_major_version }}-dev" >> $GITHUB_STEP_SUMMARY
          echo "- verana-front:v${{ steps.semantic.outputs.new_release_major_version }}.${{ steps.semantic.outputs.new_release_minor_version }}-dev" >> $GITHUB_STEP_SUMMARY
          echo "- verana-front:v${{ steps.semantic.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Helm Charts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- verana-front:v${{ steps.semantic.outputs.new_release_major_version }}.${{ steps.semantic.outputs.new_release_minor_version }}-dev" >> $GITHUB_STEP_SUMMARY
          echo "- verana-front:v${{ steps.semantic.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
