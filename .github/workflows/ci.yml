name: Continuous Integration

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled]
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  ci:
    uses: 2060-io/organization/.github/workflows/2060-linter-call.yml@d199fdc55832f78f90158117a93d227709ca2746 # main
    with:
      enable-charts-lint: true

  unit:
    name: Unit (vitest)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node v24
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm test

  e2e:
    name: E2E Ring A (fund-free)
    runs-on: ubuntu-latest
    # Ring A only: drives the real UI and real client-side amino signing, but the
    # Tendermint RPC is fully intercepted (e2e/support/mock-chain.ts), so nothing is
    # broadcast and no funds move. The injected wallet falls back to a generated
    # throwaway mnemonic when .test-mnemonic / E2E_MNEMONIC are absent.
    #
    # The real-broadcast Ring B specs (create-ecosystem, create-schema, did-add,
    # archive-tr, reclaim-yield) sign and broadcast to testnet and need a funded
    # wallet plus chain env. They live in a SEPARATE nightly/manual workflow and
    # are intentionally NOT part of this PR gate.
    env:
      E2E_HEADLESS: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Install pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - name: Setup node v24
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5.0.0
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Provide public testnet env
        run: cp .env.ci .env

      - name: Run Ring A specs (headless)
        run: pnpm exec playwright test e2e/ring-a-

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-report-ring-a
          path: playwright-report/
          retention-days: 7
